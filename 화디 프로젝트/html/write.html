<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>일기 작성</title>
        <link rel="stylesheet" href="/css/write.css">
    </head>
    <body>

        <!-- 맨 위 헤더-->
        <header>
            <div class="logo">매일기</div>
            <!--헤더 내비게이션-->
            <nav>
                <a href="loginedindex.html">홈</a>
                <a href="write.html" class="active">일기 작성</a>
                <a href="save.html">보관함</a>
                <a href="random.html">주제 추천</a>
            </nav>
        </header>

        <!-- 메인 내용 -->
        <main>
            <div class="write-day">
                <label for="date">날짜를 선택하세요:</label>
                <input type="date"
                        id="date"
                        max="2026-12-31"
                        min="2026-01-01"
                        value="2026-06-22">
            </div>
            
            <!-- 날짜 -->
            
            <div class="write-name">
                <label for="text">제목: </label>
                <input type="text" name="name"  />
            </div>
            <!-- 제목 -->
            
            <div class="write-feel">
                <label for="text">오늘의 기분: </label>
                <input type="text" name="fell" size="3" maxlength="2" />
            </div>
            <!-- 오늘의 기분 -->
            
            <div class="write-one">
                <label for="text">한 줄 요약: </label>
                <input type="text" name="one" size="60" maxlength="30"placeholder="30자 내로 한 줄"/>
            </div>
            <!-- 한 줄 요약 -->
            
            <div>
                <textarea name="comment" rows="25" cols="90" placeholder="내용을 입력하세요"></textarea>
            </div>
            <!-- 내용 입력 -->
            
            <div class="save-btn">
                <!-- 작성 완료 버튼, 누르면 보관함으로 이동 -->
                <input type="button" onclick="alert('작성을 완료하였습니다.'); location.href='/html/save.html'" value="작성 완료"class="save"/>
            </div>  
        </main>

    </body>
</html>
